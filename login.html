<!DOCTYPE html>
<html lang="en" class="bg-bureo-gray h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NetPlus Material</title>

    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://unsplash.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bureo: {
                            black: '#111111',
                            dark: '#1c1c1c',
                            gray: '#f4f4f4',
                            white: '#ffffff',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    letterSpacing: {
                        tighter: '-0.04em',
                        tight: '-0.02em',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-bureo-gray text-bureo-black font-sans antialiased h-full flex flex-col relative overflow-hidden">
    <!-- Animated Video Background -->
    <video autoplay loop muted playsinline
        class="absolute inset-0 w-full h-full object-cover z-0 opacity-40 mix-blend-overlay pointer-events-none">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-waves-in-the-water-1164-large.mp4" type="video/mp4">
    </video>

    <!-- Simple Nav -->
    <nav class="w-full py-6 px-6 md:px-12 flex justify-between items-center bg-transparent border-none relative z-10">
        <a href="index.html"
            class="text-2xl font-black tracking-tighter flex items-center gap-2 hover:opacity-70 transition-opacity">
            <div class="w-6 h-6 bg-bureo-black rounded-full mix-blend-difference"></div>
            NETPLUS®
        </a>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-6 md:px-12 pb-24 relative z-10">
        <div class="w-full max-w-5xl">
            <h1 class="text-5xl md:text-7xl font-black mb-12 text-center tracking-tighter uppercase leading-[0.9]">
                Select Portal.</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                <!-- User Portal Card -->
                <div
                    class="bg-white p-12 md:p-16 border border-black/10 hover:border-black transition-colors rounded-2xl flex flex-col items-start group">
                    <div class="w-16 h-16 rounded-full bg-bureo-gray flex items-center justify-center mb-8 shrink-0">
                        <svg class="w-8 h-8 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <h2 class="text-4xl font-black tracking-tighter mb-4">Shopper</h2>
                    <p class="text-black/60 font-medium tracking-tight mb-12">Login to browse sustainable products,
                        fashion, and farm products.</p>

                    <a href="shop.html"
                        class="mt-auto px-8 py-4 w-full text-center bg-bureo-black text-white font-bold rounded-full group-hover:scale-105 transition-transform tracking-tight text-sm">Continue
                        as User</a>
                </div>

                <!-- Business Portal Card -->
                <div
                    class="bg-bureo-black p-12 md:p-16 border border-white/20 hover:border-white transition-colors rounded-2xl flex flex-col items-start group text-white">
                    <div class="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center mb-8 shrink-0">
                        <svg class="w-8 h-8 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                            </path>
                        </svg>
                    </div>
                    <h2 class="text-4xl font-black tracking-tighter mb-4">Partner</h2>
                    <p class="text-white/60 font-medium tracking-tight mb-12">Submit items, recycle your waste, or
                        manage your sustainable inventory.</p>

                    <a href="business.html"
                        class="mt-auto px-8 py-4 w-full text-center bg-white text-bureo-black font-bold rounded-full group-hover:scale-105 transition-transform tracking-tight text-sm">Continue
                        as Business</a>
                </div>

            </div>
        </div>
    </main>

</body>

</html>
