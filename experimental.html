<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Antigravity - Experimental</title>
    <link href="https://unsplash.com">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bureo-black': '#0a0a0a',
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body
    class="bg-[#050505] text-white font-sans antialiased overflow-hidden h-screen w-screen relative selection:bg-white selection:text-black">

    <!-- Navbar Overlay -->
    <nav
        class="absolute top-0 left-0 w-full py-6 px-6 md:px-12 flex justify-between items-center z-50 pointer-events-none">
        <a href="index.html"
            class="text-2xl font-black tracking-tighter flex items-center gap-2 hover:opacity-70 transition-opacity pointer-events-auto mix-blend-difference text-white">
            <div class="w-6 h-6 bg-white rounded-full"></div>
            ANTIGRAVITY.LABS
        </a>
        <div class="text-xs font-mono tracking-widest text-white/50 uppercase">Experimental Feature • v1.0.0</div>
    </nav>

    <!-- Background Cinematic Header / Title -->
    <div class="absolute inset-0 flex flex-col items-center justify-center z-0 pointer-events-none select-none">
        <h1 class="text-[12vw] font-black tracking-tighter uppercase leading-[0.8] text-white/[0.03] text-center">
            Zero<br>Gravity
        </h1>
    </div>

    <!-- Container for dynamic physics cards -->
    <div id="antigravity-container" class="absolute inset-0 w-full h-full object-cover z-10 overflow-hidden">
        <!-- JS antigravity.js populates this div -->
    </div>

    <!-- Footer Overlay -->
    <footer
        class="absolute bottom-6 left-0 w-full px-6 md:px-12 flex justify-between items-center z-50 pointer-events-none mix-blend-difference">
        <div class="text-xs font-mono opacity-50 flex items-center gap-2 text-white">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            PHYSICS ENGINE ACTIVE
        </div>
        <p class="text-xs font-mono font-medium text-white/50">Google Antigravity © 2026</p>
    </footer>

    <!-- Scripts -->
    <!-- Not including GSAP here intentionally to let the pure JS physics engine run untethered -->
    <script src="js/antigravity.js"></script>
</body>

</html>
